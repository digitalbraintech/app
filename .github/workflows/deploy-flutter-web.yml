name: Deploy Flutter Web

# Builds the DigitalBrain Flutter client and publishes it to GitHub Pages at the
# custom apex domain (digitalbrain.tech, set via web/CNAME). Runs on push to
# master/main and is manually re-runnable from the Actions tab.

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # Served at the apex custom domain, so base href is "/". Flutter's default
      # hash URL strategy resolves routes client-side without a custom 404.html.
      # --no-tree-shake-icons: the app uses non-constant IconData, which blocks icon tree-shaking.
      - run: flutter build web --release --base-href "/" --no-tree-shake-icons

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - id: deployment
        uses: actions/deploy-pages@v4
